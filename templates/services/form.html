{% extends 'base.html' %}
{% block title %}{{ 'Редактировать' if service else 'Добавить' }} сервис{% endblock %}

{% block content %}
<nav aria-label="breadcrumb" class="mb-3">
  <ol class="breadcrumb">
    <li class="breadcrumb-item"><a href="{{ url_for('service_list') }}">Каталог сервисов</a></li>
    <li class="breadcrumb-item active">{{ 'Редактировать' if service else 'Добавить' }}</li>
  </ol>
</nav>

<div class="card" style="max-width:520px;">
  <div class="card-header fw-semibold">
    <i class="bi bi-box-seam me-1"></i>
    {{ 'Редактировать сервис' if service else 'Новый сервис' }}
  </div>
  <div class="card-body">
    <form method="post">
      <div class="mb-3">
        <label class="form-label fw-semibold">
          Системное название <span class="text-danger">*</span>
          <span class="text-muted fw-normal small">(как в SC / реестре)</span>
        </label>
        <input type="text" name="name" class="form-control font-monospace"
               value="{{ service.name if service else '' }}"
               placeholder="MyCompany.PaymentService" required autofocus>
      </div>

      <div class="mb-3">
        <label class="form-label fw-semibold">Display Name</label>
        <input type="text" name="display_name" class="form-control"
               value="{{ service.display_name if service else '' }}"
               placeholder="Payment Service">
      </div>

      <div class="mb-4">
        <label class="form-label fw-semibold">Описание</label>
        <textarea name="description" class="form-control" rows="3"
                  placeholder="Краткое описание назначения сервиса">{{ service.description if service else '' }}</textarea>
      </div>

      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary">
          <i class="bi bi-check-lg me-1"></i>{{ 'Сохранить' if service else 'Добавить' }}
        </button>
        <a href="{{ url_for('service_list') }}" class="btn btn-outline-secondary">Отмена</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
