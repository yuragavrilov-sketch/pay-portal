{% extends 'base.html' %}
{% block title %}{{ 'Редактировать' if env else 'Создать' }} окружение{% endblock %}

{% block content %}
<nav aria-label="breadcrumb" class="mb-3">
  <ol class="breadcrumb">
    <li class="breadcrumb-item"><a href="{{ url_for('env_list') }}">Окружения</a></li>
    <li class="breadcrumb-item active">{{ 'Редактировать' if env else 'Создать' }}</li>
  </ol>
</nav>

<div class="card" style="max-width:520px;">
  <div class="card-header fw-semibold">
    <i class="bi bi-layers me-1"></i>
    {{ 'Редактировать окружение' if env else 'Новое окружение' }}
  </div>
  <div class="card-body">
    <form method="post">
      <div class="mb-3">
        <label class="form-label fw-semibold">Название <span class="text-danger">*</span></label>
        <input type="text" name="name" class="form-control"
               value="{{ env.name if env else '' }}"
               placeholder="prod / stage / dev" required autofocus>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold">Описание</label>
        <input type="text" name="description" class="form-control"
               value="{{ env.description if env else '' }}"
               placeholder="Краткое описание">
      </div>
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary">
          <i class="bi bi-check-lg me-1"></i>{{ 'Сохранить' if env else 'Создать' }}
        </button>
        <a href="{{ url_for('env_list') }}" class="btn btn-outline-secondary">Отмена</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
